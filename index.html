<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Check</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-100 via-purple-100 to-indigo-100 flex items-center justify-center">
  <div class="text-center px-6">
    <div id="emoji" class="text-8xl mb-6">🎂</div>
    <div id="message" class="text-2xl font-semibold text-gray-700 mb-2">Checking...</div>
    <div id="sub" class="text-sm text-gray-400 mt-4"></div>
  </div>
  <script>
    async function check() {
      try {
        const res = await fetch('/api');
        const data = await res.json();
        const isBirthday = data.message.startsWith('happy');
        document.getElementById('emoji').textContent = isBirthday ? '🎉' : '😢';
        document.getElementById('message').textContent = data.message;
        document.getElementById('sub').textContent = isBirthday
          ? 'Have a wonderful day, Roma!'
          : "Roma's birthday is December 27th.";
      } catch {
        document.getElementById('emoji').textContent = '⚠️';
        document.getElementById('message').textContent = 'Could not reach the API.';
      }
    }
    check();
  </script>
</body>
</html>
